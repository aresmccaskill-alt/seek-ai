<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1>📝 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>

            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">➕ Add</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Total:</span>
                    <span id="totalCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Active:</span>
                    <span id="activeCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span id="completedCount" class="stat-value">0</span>
                </div>
            </div>

            <div class="todo-list" id="todoList">
                <div class="empty-state">
                    <p>📭 No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <div class="actions">
                <button id="clearCompletedBtn" class="clear-btn">🗑️ Clear Completed</button>
                <button id="clearAllBtn" class="clear-btn danger">⚠️ Clear All</button>
            </div>
        </div>
    </div>

    <script src="todo-app.js"></script>
</body>
</html>
