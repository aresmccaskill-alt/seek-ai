<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <meta name="theme-color" content="#020d1a">
    <meta name="description" content="Seek AI — voice-controlled neural interface. Commands, chat, and drawing powered by AI.">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="seek-eye.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    
    <!-- iOS / Safari home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Seek AI">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Seek AI">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Seek AI">
    <meta property="og:description" content="Voice-controlled AI assistant — tap to activate.">
    <meta property="og:image" content="icon-512.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <title>Seek AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root">
        <div class="min-h-screen w-full bg-background text-foreground overflow-hidden font-mono relative select-none">
            <!-- Visual Effects -->
            <div class="noise-overlay"></div>
            <div class="scanline"></div>
            <canvas class="fixed inset-0 pointer-events-none z-0" width="957" height="959"></canvas>
            
            <!-- System Log Sidebar -->
            <div class="fixed right-0 top-0 bottom-0 w-80 md:w-96 bg-black/80 backdrop-blur-xl border-l border-primary/30 z-40 flex flex-col" style="transform: translateX(100%);">
                <div class="p-6 border-b border-primary/30 flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-terminal text-primary h-5 w-5" aria-hidden="true">
                        <path d="M12 19h8"></path>
                        <path d="m4 17 6-6-6-6"></path>
                    </svg>
                    <h2 class="text-lg font-mono font-bold text-primary tracking-widest uppercase text-glow">System Log</h2>
                </div>
                <div class="relative overflow-hidden flex-1 p-6">
                    <div class="h-full w-full rounded-inherit overflow-y-auto">
                        <div class="space-y-6">
                            <div class="text-center text-muted-foreground font-mono text-sm mt-10 opacity-50">No commands registered.</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="fixed inset-0 z-10 flex flex-col p-5 md:p-7" style="pointer-events: auto; opacity: 1;">
                <!-- Header -->
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <h1 class="text-2xl md:text-3xl font-bold tracking-widest text-primary text-glow uppercase">Seek AI</h1>
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full transition-colors duration-300 bg-muted-foreground"></div>
                            <span class="text-[10px] uppercase tracking-widest opacity-50">idle</span>
                        </div>
                    </div>
                    
                    <!-- Control Buttons -->
                    <div class="flex gap-2 items-center flex-wrap justify-end">
                        <button class="control-btn" title="Add to Home Screen">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3 w-3">
                                <rect width="14" height="20" x="5" y="2" rx="2" ry="2"></rect>
                                <path d="M12 18h.01"></path>
                            </svg>
                            Home Screen
                        </button>
                        <button class="control-btn" title="Memories">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5">
                                <path d="M12 7v14"></path>
                                <path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"></path>
                            </svg>
                        </button>
                        <button class="control-btn" title="Seek AI Device">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3 w-3">
                                <path d="M7 21h10"></path>
                                <rect width="20" height="14" x="2" y="3" rx="2"></rect>
                            </svg>
                            Device
                        </button>
                        <button class="control-btn icon-only" title="JS Scratchpad">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5">
                                <path d="m18 16 4-4-4-4"></path>
                                <path d="m6 8-4 4 4 4"></path>
                                <path d="m14.5 4-5 16"></path>
                            </svg>
                        </button>
                        <button class="control-btn icon-only" title="System — Console & Reminders">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5">
                                <path d="M12 17v4"></path>
                                <path d="M22 12.307V15a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8.693"></path>
                                <path d="M8 21h8"></path>
                                <circle cx="19" cy="6" r="3"></circle>
                            </svg>
                        </button>
                        <button class="control-btn icon-only" title="Developer Panel">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5">
                                <path d="M12 19h8"></path>
                                <path d="m4 17 6-6-6-6"></path>
                            </svg>
                        </button>
                        <button class="control-btn icon-only" title="Info">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 16v-4"></path>
                                <path d="M12 8h.01"></path>
                            </svg>
                        </button>
                        <button class="control-btn icon-only" title="History">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                                <path d="M3 3v5h5"></path>
                                <path d="M12 7v5l4 2"></path>
                            </svg>
                        </button>
                        <button class="control-btn icon-only destructive" title="Close">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3.5 w-3.5">
                                <path d="M18 6 6 18"></path>
                                <path d="m6 6 12 12"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Center Content -->
                <div class="flex-1 flex items-center justify-center pb-44 px-6 md:px-16 pointer-events-none">
                    <div class="text-center max-w-2xl w-full space-y-4">
                        <div class="text-xs uppercase tracking-[0.4em] text-primary/20" style="opacity: 1;">Tap the eye or press Start Listening</div>
                    </div>
                </div>
                
                <!-- Start Button -->
                <div class="absolute bottom-5 left-0 right-0 flex justify-center" style="padding-bottom: 4px;">
                    <button class="flex items-center gap-2 px-5 py-2 rounded-full font-mono text-[11px] uppercase tracking-widest border transition-all duration-300 bg-black/40 border-primary/30 text-primary/60 hover:border-primary hover:text-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-3 w-3">
                            <path d="M12 19v3"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <rect x="9" y="2" width="6" height="13" rx="3"></rect>
                        </svg>
                        Start Listening
                    </button>
                </div>
            </div>
            
            <!-- Animated Eye -->
            <div class="cursor-pointer" id="eyeContainer" style="position: fixed; bottom: 72px; z-index: 30; width: 140px; height: 80px; left: 50%; transform: scale(1.01992); transform-origin: 50% 50% 0px;">
                <div class="relative w-full h-full overflow-hidden" style="border-radius: 50%;">
                    <div class="absolute inset-0" style="background: radial-gradient(rgb(10, 22, 40) 0%, rgb(4, 10, 20) 100%); border-radius: 50%; border: 2px solid rgb(0, 204, 255); box-shadow: rgba(0, 180, 255, 0.3) 0px 0px 30px, rgba(0, 0, 0, 0.8) 0px 0px 20px inset;"></div>
                    <div class="absolute" style="width: 55%; height: 95%; top: 2.5%; left: 22.5%; border-radius: 50%; background: radial-gradient(circle at 40% 35%, rgba(0, 204, 255, 0.533) 0%, rgba(0, 204, 255, 0.267) 40%, rgba(0, 204, 255, 0.067) 100%); border: 2px solid rgba(0, 204, 255, 0.6); box-shadow: rgba(0, 180, 255, 0.3) 0px 0px 20px; transform: none;">
                        <div class="absolute" style="width: 75%; height: 75%; top: 12.5%; left: 12.5%; border-radius: 50%; border: 1px solid rgba(0, 204, 255, 0.157);"></div>
                        <div class="absolute" style="width: 55%; height: 55%; top: 22.5%; left: 22.5%; border-radius: 50%; border: 1px solid rgba(0, 204, 255, 0.235);"></div>
                        <div class="absolute" style="width: 35%; height: 35%; top: 32.5%; left: 32.5%; border-radius: 50%; border: 1px solid rgba(0, 204, 255, 0.314);"></div>
                    </div>
                    <div class="absolute" style="width: 28%; height: 52%; top: 24%; left: 36%; border-radius: 50%; background: radial-gradient(circle at 40% 35%, rgb(17, 17, 17) 0%, rgb(0, 0, 0) 100%); box-shadow: rgba(0, 0, 0, 0.9) 0px 0px 10px inset; transform: none;">
                        <div class="absolute rounded-full bg-white/30" style="width: 30%; height: 25%; top: 15%; left: 20%;"></div>
                    </div>
                    <div class="eyelid absolute w-full" style="height: 52%; top: 0px; left: 0px; background: rgb(4, 10, 20); border-radius: 50% 50% 0px 0px / 100% 100% 0px 0px; transform-origin: center top; transition: transform 0.1s ease-in-out;"></div>
                    <div class="eyelid absolute w-full" style="height: 52%; bottom: 0px; left: 0px; background: rgb(4, 10, 20); border-radius: 0px 0px 50% 50% / 0px 0px 100% 100%; transform-origin: center bottom; transition: transform 0.1s ease-in-out;"></div>
                </div>
                <div class="absolute inset-0" style="border-radius: 50%; border: 2px solid rgb(0, 204, 255); pointer-events: none;"></div>
                <div class="absolute -bottom-6 left-0 right-0 text-center text-[10px] uppercase tracking-widest font-mono text-primary/50">tap to listen</div>
            </div>
        </div>
    </div>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker registered');
                }).catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
            });
        }
        
        // Install prompt handler
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.querySelector('[title="Add to Home Screen"]').style.display = 'inline-flex';
        });
        
        document.querySelector('[title="Add to Home Screen"]').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to install prompt: ${outcome}`);
                deferredPrompt = null;
            }
        });
    </script>
    
    <script src="app.js"></script>
</body>
</html>
